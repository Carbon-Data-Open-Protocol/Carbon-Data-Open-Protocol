name: Generate CDOP JSON Schemas

on:
  push:
    paths:
      - "docs/CDOP_SCHEMA.xlsx"
      - "scripts/generate_json_schemas.py"
      - ".github/workflows/build-json-schemas.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-json-schemas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Generate JSON schemas
        run: |
          python scripts/generate_json_schemas.py

      - name: Commit generated schemas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add json_schema_output/

          if git diff --cached --quiet; then
            echo "No schema changes to commit."
          else
            git commit -m "Generate CDOP JSON schemas"
            git push
          fi